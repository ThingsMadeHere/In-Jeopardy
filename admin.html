<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeopardy! Admin</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>JEOPARDY! ADMIN</h1>
      <div class="admin-actions">
        <button id="save-btn" class="btn primary">Save Configuration</button>
        <button id="load-btn" class="btn">Load Default</button>
        <button id="export-btn" class="btn">Export JSON</button>
        <button id="import-btn" class="btn">Import JSON</button>
        <a href="/teacher.html" class="btn">Back to Game</a>
      </div>
    </header>

    <div class="board-settings">
      <h2>Board Settings</h2>
      <div class="settings-grid">
        <div class="setting">
          <label for="num-categories">Categories:</label>
          <input type="number" id="num-categories" min="1" max="10" value="6">
        </div>
        <div class="setting">
          <label for="num-questions">Questions per Category:</label>
          <input type="number" id="num-questions" min="1" max="10" value="5">
        </div>
        <div class="setting">
          <label for="start-value">Starting Value:</label>
          <input type="number" id="start-value" min="100" step="100" value="200">
        </div>
        <div class="setting">
          <label for="value-step">Value Step:</label>
          <input type="number" id="value-step" min="100" step="100" value="200">
        </div>
      </div>
      <button id="apply-board-btn" class="btn">Apply Board Settings</button>
    </div>

    <div class="config-section">
      <h2>Categories & Questions</h2>
      <div id="categories-container"></div>
      <button id="add-category-btn" class="btn primary">Add Category</button>
    </div>

    <div class="config-list">
      <h2>Saved Configurations</h2>
      <div id="saved-configs"></div>
    </div>
  </div>

  <!-- Import Modal -->
  <div id="import-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Import Configuration</h3>
      <textarea id="import-json" placeholder="Paste JSON here..."></textarea>
      <div class="modal-buttons">
        <button id="confirm-import" class="btn primary">Import</button>
        <button id="cancel-import" class="btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
