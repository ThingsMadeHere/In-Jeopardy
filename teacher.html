<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeopardy!</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>JEOPARDY!</h1>
      <div class="score-board" id="score-board"></div>
    </header>

    <main>
      <div id="game-board" class="game-board"></div>
    </main>

    <div id="question-modal" class="modal hidden">
      <div class="modal-content">
        <div class="category-label" id="modal-category"></div>
        <div class="value-label" id="modal-value"></div>
        <div id="team-selection" class="team-selection hidden"></div>
        <div class="question-text" id="modal-question"></div>
        <div class="answer-section hidden" id="answer-section">
          <div class="answer-text" id="modal-answer"></div>
          <div class="score-buttons hidden" id="score-buttons">
            <button class="score-btn" data-points="100">+100</button>
            <button class="score-btn" data-points="200">+200</button>
            <button class="score-btn" data-points="300">+300</button>
            <button class="score-btn" data-points="400">+400</button>
            <button class="score-btn" data-points="500">+500</button>
            <button class="score-btn negative" data-points="-100">-100</button>
            <button class="score-btn negative" data-points="-200">-200</button>
            <button class="score-btn negative" data-points="-300">-300</button>
            <button class="score-btn negative" data-points="-400">-400</button>
            <button class="score-btn negative" data-points="-500">-500</button>
          </div>
        </div>
        <div class="modal-buttons">
          <button id="show-answer-btn" class="btn hidden">Show Answer</button>
          <button id="close-btn" class="btn close hidden">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
